<!DOCTYPE html>
<html lang="zh-TW" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩豐鍋爐 - 日常巡檢與維修履歷平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#0284c7',
                            600: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="h-full flex overflow-hidden font-sans antialiased">

    <!-- 側邊導覽列 -->
    <aside class="w-72 bg-slate-950 border-r border-slate-800 flex flex-col justify-between shrink-0">
        <div class="overflow-y-auto">
            <!-- Logo 區塊 -->
            <div class="h-16 flex items-center px-4 border-b border-slate-800 bg-slate-900/50 gap-3">
                <div class="bg-white/90 p-1 rounded">
                    <img src="https://i.imgur.com/8QZ3X1s.png" alt="sfre logo" class="h-7 object-contain">
                </div>
                <div>
                    <h1 class="font-bold text-sm tracking-wide text-white">碩豐熱能</h1>
                    <p class="text-[10px] text-slate-400">巡檢與履歷管理平台</p>
                </div>
            </div>

            <!-- 左側設備選擇與管理區塊 -->
            <div class="p-4 border-b border-slate-800/80 bg-slate-900/40 space-y-2">
                <div class="flex items-center justify-between">
                    <label for="leftBoilerSelect" class="text-xs font-semibold text-slate-300 flex items-center gap-1.5">
                        <i class="fa-solid fa-industry text-sky-400"></i> 當前巡檢設備：
                    </label>
                    <button onclick="toggleBoilerManager()" class="text-[11px] text-sky-400 hover:text-sky-300 flex items-center gap-1 bg-sky-500/10 px-2 py-0.5 rounded border border-sky-500/20">
                        <i class="fa-solid fa-gear"></i> 管理
                    </button>
                </div>
                
                <!-- 設備選單 -->
                <select id="leftBoilerSelect" onchange="onBoilerChange()" class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-lg p-2 focus:ring-1 focus:ring-sky-500 focus:outline-none">
                    <!-- 動態由 JavaScript 生成 -->
                </select>

                <!-- 設備新增/修改管理彈窗面板 (預設隱藏) -->
                <div id="boilerManagerBox" class="hidden p-3 mt-2 bg-slate-900 rounded-lg border border-sky-500/30 text-xs space-y-2">
                    <div class="font-bold text-slate-200 flex justify-between items-center border-b border-slate-800 pb-1">
                        <span>設備項目編輯</span>
                        <button onclick="toggleBoilerManager()" class="text-slate-400 hover:text-white">✕</button>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5">設備名稱：</label>
                        <input type="text" id="editBoilerName" placeholder="輸入設備名稱..." class="w-full bg-slate-800 border border-slate-700 p-1.5 rounded text-white text-xs">
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button onclick="saveCurrentBoilerName()" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white py-1 rounded text-[11px] font-medium">修改此設備</button>
                        <button onclick="addNewBoiler()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-1 rounded text-[11px] font-medium">新增為新設備</button>
                    </div>
                </div>
            </div>

            <!-- 選單項目 -->
            <nav class="p-4 space-y-1">
                <a href="#" onclick="switchTab('inspection')" id="nav-inspection" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-brand-600 text-white">
                    <i class="fa-solid fa-clipboard-check w-5 text-sky-400"></i> 日常巡檢填報
                </a>
                <a href="#" onclick="switchTab('trends')" id="nav-trends" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i class="fa-solid fa-chart-line w-5 text-emerald-400"></i> 巡檢數據與趨勢
                </a>
                <a href="#" onclick="switchTab('maintenance')" id="nav-maintenance" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i class="fa-solid fa-wrench w-5 text-amber-400"></i> 維修保養履歷
                </a>
                <a href="#" onclick="switchTab('reminders')" id="nav-reminders" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i class="fa-solid fa-bell w-5 text-purple-400"></i> 巡檢提醒與排程
                </a>
            </nav>
        </div>

        <!-- 底部使用者資訊 -->
        <div class="p-4 border-t border-slate-800 bg-slate-900/30">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-200">巡診</div>
                <div class="text-xs">
                    <p class="text-white font-medium">巡檢員：張工程師</p>
                    <p class="text-slate-400 text-[10px]">廠區維護組</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- 主要內容區塊 -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-900">
        
        <!-- 頂部 Header & 巡檢提醒 Banner -->
        <header class="border-b border-slate-800 bg-slate-950/40 px-6 py-3 shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400">當前選擇：</span>
                <span id="headerBoilerTitle" class="text-sm font-bold text-sky-400">#1 貫流式蒸氣鍋爐 (1.5 Ton/hr)</span>
            </div>

            <!-- 巡檢提醒智慧橫幅 -->
            <div id="reminderBanner" class="flex items-center gap-3 px-4 py-1.5 bg-amber-500/10 border border-amber-500/30 rounded-lg text-amber-300 text-xs">
                <i class="fa-solid fa-clock-rotate-left text-base animate-pulse"></i>
                <div>
                    <span class="font-bold">【巡檢提醒】</span>
                    <span>距離今天「班次巡檢」填報期限剩餘 <strong>01:45:00</strong></span>
                </div>
                <button onclick="switchTab('inspection')" class="ml-2 px-2 py-0.5 bg-amber-500 text-slate-950 font-bold rounded text-[11px] hover:bg-amber-400">立即填報</button>
            </div>
        </header>

        <!-- 頁籤內容區 -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6">

            <!-- TAB 1: 巡檢資料填報 -->
            <div id="tab-inspection" class="tab-content space-y-6">
                
                <!-- 設備基本資料 (文字輸入/補充說明區) -->
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-semibold text-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-circle-info text-sky-400"></i> 設備詳細規格與備註資料 (動態輸入)
                        </label>
                        <button onclick="saveBoilerDetails()" class="text-[11px] bg-sky-600 hover:bg-sky-500 text-white px-2.5 py-1 rounded flex items-center gap-1">
                            <i class="fa-solid fa-floppy-disk"></i> 儲存設備資料
                        </button>
                    </div>
                    <textarea id="boilerDetailText" rows="2" placeholder="請輸入該設備的詳細規格、廠牌番號、放置位置或特別注意事項..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-slate-200 focus:border-sky-500 focus:outline-none"></textarea>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- 輸入表單 -->
                    <div class="lg:col-span-2 bg-slate-800/60 border border-slate-700/60 rounded-xl p-6">
                        <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-700">
                            <h2 class="font-semibold text-slate-100 flex items-center gap-2">
                                <i class="fa-solid fa-pen-to-square text-sky-400"></i> 新增日常巡檢紀錄
                            </h2>
                            <span class="text-xs text-slate-400" id="currentDateStr">2026-07-21</span>
                        </div>

                        <form id="inspectionForm" onsubmit="submitInspection(event)" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                                <div>
                                    <label class="block text-slate-300 mb-1">蒸氣壓力 (MPa)</label>
                                    <input type="number" step="0.01" id="inputPressure" required value="0.78" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:border-sky-500 focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-slate-300 mb-1">排煙溫度 (°C)</label>
                                    <input type="number" step="0.1" id="inputFlueTemp" required value="178.5" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:border-sky-500 focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-slate-300 mb-1">給水預熱溫度 (°C)</label>
                                    <input type="number" step="0.1" id="inputWaterTemp" required value="58.0" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:border-sky-500 focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-slate-300 mb-1">水質硬度 (ppm)</label>
                                    <input type="number" id="inputHardness" required value="15" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:border-sky-500 focus:outline-none">
                                </div>
                            </div>

                            <div class="border-t border-slate-700/60 pt-4">
                                <label class="block text-xs font-semibold text-slate-300 mb-2">現場檢查項目：</label>
                                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-xs">
                                    <label class="flex items-center gap-2 bg-slate-900/50 p-2.5 rounded border border-slate-700/50 cursor-pointer">
                                        <input type="checkbox" checked class="rounded text-sky-500 focus:ring-0"> 燃燒火焰顏色正常
                                    </label>
                                    <label class="flex items-center gap-2 bg-slate-900/50 p-2.5 rounded border border-slate-700/50 cursor-pointer">
                                        <input type="checkbox" checked class="rounded text-sky-500 focus:ring-0"> 泵浦運轉無異音
                                    </label>
                                    <label class="flex items-center gap-2 bg-slate-900/50 p-2.5 rounded border border-slate-700/50 cursor-pointer">
                                        <input type="checkbox" checked class="rounded text-sky-500 focus:ring-0"> 水位計與安全閥無洩漏
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label class="block text-slate-300 text-xs mb-1">巡檢備註：</label>
                                <textarea id="inputNotes" rows="2" placeholder="備註說明..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-slate-100 focus:border-sky-500 focus:outline-none"></textarea>
                            </div>

                            <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2.5 rounded-lg transition-all text-xs flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> 儲存巡檢紀錄
                            </button>
                        </form>
                    </div>

                    <!-- AI 即時診斷 -->
                    <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-5 flex flex-col justify-between">
                        <div>
                            <h2 class="font-semibold text-slate-200 mb-4 flex items-center gap-2 border-b border-slate-700 pb-3">
                                <i class="fa-solid fa-microchip text-purple-400"></i> AI 巡檢即時診斷
                            </h2>
                            <div class="space-y-4">
                                <div class="p-3 bg-slate-900/80 rounded-lg border border-slate-700">
                                    <p class="text-xs text-slate-400">設備當前健康度預估</p>
                                    <p class="text-2xl font-bold text-emerald-400 mt-1" id="aiHealthScore">96 / 100</p>
                                </div>
                            </div>
                        </div>

                        <div id="aiAlertNotice" class="mt-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-lg text-xs text-emerald-300">
                            <i class="fa-solid fa-check-circle me-1"></i> 巡檢數據正常，請持續保持。
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 2: 巡檢歷史數據與趨勢圖表 -->
            <div id="tab-trends" class="tab-content hidden space-y-6">
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5">
                    <h2 class="font-semibold text-slate-200 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-chart-line text-emerald-400"></i> 近期巡檢數據趨勢
                    </h2>
                    <div class="h-72">
                        <canvas id="inspectionTrendChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- TAB 3: 維修保養履歷 -->
            <div id="tab-maintenance" class="tab-content hidden space-y-6">
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5">
                    <h2 class="font-semibold text-slate-200 mb-4">維修與保養工單紀錄</h2>
                    <p class="text-xs text-slate-400">提供完整全生命週期保養紀錄管理。</p>
                </div>
            </div>

            <!-- TAB 4: 巡檢提醒與設定 -->
            <div id="tab-reminders" class="tab-content hidden space-y-6">
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5">
                    <h2 class="font-semibold text-slate-200 mb-4">智慧巡檢提醒與排程設定</h2>
                </div>
            </div>

        </div>
    </main>

    <script>
        // 設備資料庫與細節
        let boilers = [
            { id: "B01", name: "#1 貫流式蒸氣鍋爐 (1.5 Ton/hr)", detail: "型號: SF-1500, 安裝日期: 2024-03, 常用壓力: 0.8 MPa" },
            { id: "B02", name: "#2 臥式火管鍋爐 (3.0 Ton/hr)", detail: "型號: SF-3000H, 安裝日期: 2023-11, 常用壓力: 0.75 MPa" }
        ];

        let selectedBoilerId = "B01";

        function renderBoilerOptions() {
            const select = document.getElementById('leftBoilerSelect');
            select.innerHTML = '';
            boilers.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.innerText = b.name;
                if (b.id === selectedBoilerId) opt.selected = true;
                select.appendChild(opt);
            });
            updateCurrentBoilerUI();
        }

        function onBoilerChange() {
            selectedBoilerId = document.getElementById('leftBoilerSelect').value;
            updateCurrentBoilerUI();
        }

        function updateCurrentBoilerUI() {
            const current = boilers.find(b => b.id === selectedBoilerId);
            if (current) {
                document.getElementById('headerBoilerTitle').innerText = current.name;
                document.getElementById('editBoilerName').value = current.name;
                document.getElementById('boilerDetailText').value = current.detail || '';
            }
        }

        function toggleBoilerManager() {
            document.getElementById('boilerManagerBox').classList.toggle('hidden');
        }

        function saveCurrentBoilerName() {
            const newName = document.getElementById('editBoilerName').value.trim();
            if (!newName) return alert("請輸入設備名稱！");
            const current = boilers.find(b => b.id === selectedBoilerId);
            if (current) {
                current.name = newName;
                renderBoilerOptions();
                alert("✅ 設備名稱修改成功！");
            }
        }

        function addNewBoiler() {
            const newName = document.getElementById('editBoilerName').value.trim();
            if (!newName) return alert("請輸入新設備名稱！");
            const newId = "B" + String(boilers.length + 1).padStart(2, '0');
            boilers.push({ id: newId, name: newName, detail: "新新增設備規格資料..." });
            selectedBoilerId = newId;
            renderBoilerOptions();
            alert("✅ 新設備建立完成！已切換至該設備。");
        }

        function saveBoilerDetails() {
            const detailText = document.getElementById('boilerDetailText').value;
            const current = boilers.find(b => b.id === selectedBoilerId);
            if (current) {
                current.detail = detailText;
                alert("✅ 設備詳細規格與備註已儲存！");
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('bg-brand-600', 'text-white');
                el.classList.add('text-slate-400');
            });

            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            const activeNav = document.getElementById(`nav-${tabId}`);
            if (activeNav) {
                activeNav.classList.add('bg-brand-600', 'text-white');
                activeNav.classList.remove('text-slate-400');
            }
        }

        function submitInspection(e) {
            e.preventDefault();
            alert("✅ 巡檢紀錄提交成功！");
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderBoilerOptions();
            
            const ctx = document.getElementById('inspectionTrendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['07/16', '07/17', '07/18', '07/19', '07/20'],
                    datasets: [{
                        label: '排煙溫度 (°C)',
                        data: [175, 176, 178, 177, 177],
                        borderColor: '#f59e0b'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        });
    </script>
</body>
</html>
