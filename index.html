<!DOCTYPE html>
<html lang="zh-TW" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩豐熱能 - 巡檢與履歷管理平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#0284c7',
                            600: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        @media print {
            aside, header, button, .no-print { display: none !important; }
            main { overflow: visible !important; }
            body { background: white !important; color: black !important; }
            .print-text-dark { color: black !important; }
        }
    </style>
</head>
<body class="h-full flex overflow-hidden font-sans antialiased relative" onclick="closeInspectorMenuOnOutsideClick(event)">

    <!-- 手機版側邊欄遮罩 -->
    <div id="mobileBackdrop" class="hidden fixed inset-0 bg-black/60 z-30 lg:hidden" onclick="toggleSidebar()"></div>

    <!-- 側邊導覽列 -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-slate-950 border-r border-slate-800 flex flex-col justify-between shrink-0 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
        <div class="overflow-y-auto">
            <!-- Logo 區塊 -->
            <div class="h-16 flex items-center justify-between px-4 border-b border-slate-800 bg-slate-900/50">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center text-slate-950 font-black shadow-lg shadow-sky-500/20">
                        <i class="fa-solid fa-fire-flame-curved text-lg"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-sm tracking-wide text-white">碩豐熱能</h1>
                        <p class="text-[10px] text-slate-400">巡檢與履歷管理平台</p>
                    </div>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white p-2">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- 左側設備選擇與管理區塊 -->
            <div class="p-4 border-b border-slate-800/80 bg-slate-900/40 space-y-2.5">
                <div class="flex items-center justify-between">
                    <label for="leftBoilerSelect" class="text-xs font-semibold text-slate-300 flex items-center gap-1.5">
                        <i class="fa-solid fa-industry text-sky-400"></i> 當前巡檢設備：
                    </label>
                    <button onclick="toggleBoilerManager()" class="text-[11px] text-sky-400 hover:text-sky-300 flex items-center gap-1 bg-sky-500/10 px-2 py-0.5 rounded border border-sky-500/20 transition-colors">
                        <i class="fa-solid fa-gear"></i> 管理
                    </button>
                </div>
                
                <select id="leftBoilerSelect" onchange="onBoilerChange()" class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-lg p-2 focus:ring-1 focus:ring-sky-500 focus:outline-none">
                </select>

                <div class="p-2.5 bg-slate-950/60 rounded-lg border border-slate-800 text-[11px] space-y-1">
                    <div class="text-slate-400 flex items-center gap-1">
                        <i class="fa-solid fa-circle-info text-sky-400 text-[10px]"></i>
                        <span class="font-medium text-slate-300">設備規格與備註：</span>
                    </div>
                    <p id="leftBoilerDetailDisplay" class="text-slate-300 font-mono leading-relaxed pl-3.5 break-words">
                        載入中...
                    </p>
                </div>

                <!-- 設備新增/修改與 QR Code 產生視窗 -->
                <div id="boilerManagerBox" class="hidden p-3 mt-2 bg-slate-900 rounded-lg border border-sky-500/30 text-xs space-y-3 shadow-xl">
                    <div class="font-bold text-slate-200 flex justify-between items-center border-b border-slate-800 pb-1.5">
                        <span class="flex items-center gap-1.5"><i class="fa-solid fa-pen-to-square text-sky-400"></i> 設備項目管理</span>
                        <button onclick="toggleBoilerManager()" class="text-slate-400 hover:text-white">✕</button>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5">設備名稱：</label>
                        <input type="text" id="editBoilerName" placeholder="輸入設備名稱..." class="w-full bg-slate-800 border border-slate-700 p-1.5 rounded text-white text-xs focus:outline-none focus:border-sky-500">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5">鍋爐類型：</label>
                        <select id="editBoilerType" class="w-full bg-slate-800 border border-slate-700 p-1.5 rounded text-white text-xs">
                            <option value="steam">蒸氣鍋爐</option>
                            <option value="hotwater">熱水鍋爐</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5">設備規格 / 備註資訊：</label>
                        <textarea id="editBoilerDetail" rows="2" placeholder="例: 型號: SF-100HW" class="w-full bg-slate-800 border border-slate-700 p-1.5 rounded text-white text-xs focus:outline-none focus:border-sky-500"></textarea>
                    </div>

                    <div class="flex gap-2 pt-1">
                        <button onclick="saveCurrentBoilerName()" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white py-1.5 rounded text-[11px] font-medium transition-colors">儲存修改</button>
                        <button onclick="addNewBoiler()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-1.5 rounded text-[11px] font-medium transition-colors">新增為新設備</button>
                    </div>

                    <button onclick="deleteCurrentBoiler()" class="w-full bg-rose-900/60 hover:bg-rose-800 text-rose-200 border border-rose-700/50 py-1 rounded text-[10px] flex items-center justify-center gap-1 transition-colors">
                        <i class="fa-solid fa-trash-can"></i> 刪除此設備
                    </button>

                    <!-- 生成專屬 QR Code 按鈕 -->
                    <button onclick="generateQRCodeForCurrentBoiler()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-1.5 rounded text-[11px] font-bold flex items-center justify-center gap-1.5 transition-colors shadow-md shadow-indigo-600/20">
                        <i class="fa-solid fa-qrcode"></i> 生成專屬 QR Code
                    </button>

                    <!-- QR Code 顯示區 -->
                    <div id="qrCodeContainer" class="hidden pt-3 border-t border-slate-800 text-center space-y-2">
                        <p class="text-[10px] font-bold text-indigo-300 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-mobile-screen-button"></i> <span id="qrCodeTitleDisplay">設備專屬 QR Code</span>
                        </p>
                        <div class="p-2 bg-white rounded-lg inline-block shadow-lg">
                            <div id="qrcode" class="flex justify-center items-center"></div>
                        </div>
                        <p id="qrCodeUrlText" class="text-[9px] text-slate-400 font-mono break-all px-2"></p>
                    </div>
                </div>
            </div>

            <!-- 選單項目 -->
            <nav class="p-4 space-y-1">
                <a href="#" onclick="switchTab('inspection')" id="nav-inspection" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-brand-600 text-white">
                    <i class="fa-solid fa-clipboard-check w-5 text-sky-400"></i> 日常巡檢填報
                </a>
                <a href="#" onclick="switchTab('trends')" id="nav-trends" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i class="fa-solid fa-chart-line w-5 text-emerald-400"></i> 巡檢數據與趨勢
                </a>
                <a href="#" onclick="switchTab('maintenance')" id="nav-maintenance" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i class="fa-solid fa-wrench w-5 text-amber-400"></i> 維修保養履歷
                </a>
            </nav>
        </div>

        <!-- 可點擊修改的巡檢員資訊欄位 -->
        <div class="p-4 border-t border-slate-800 bg-slate-900/50 relative" id="inspectorArea">
            <div onclick="toggleInspectorMenu(event)" class="flex items-center justify-between cursor-pointer hover:bg-slate-800/80 p-2 -m-2 rounded-lg transition-colors group">
                <div class="flex items-center gap-2.5">
                    <div id="inspectorAvatar" class="w-8 h-8 rounded-full bg-sky-600/30 border border-sky-500/50 flex items-center justify-center text-xs font-bold text-sky-300 group-hover:scale-105 transition-transform">
                        張
                    </div>
                    <div class="text-xs">
                        <p class="text-white font-medium flex items-center gap-1">
                            <span id="inspectorName">張工程師</span>
                            <i class="fa-solid fa-pen text-[10px] text-slate-500 group-hover:text-sky-400 transition-colors"></i>
                        </p>
                        <p class="text-slate-400 text-[10px]" id="inspectorDept">廠區維護組</p>
                    </div>
                </div>
                <i class="fa-solid fa-ellipsis-vertical text-slate-500 group-hover:text-slate-300 text-xs"></i>
            </div>

            <!-- 修改人員資料彈出面板 -->
            <div id="inspectorEditBox" class="hidden absolute bottom-full left-4 right-4 mb-2 p-3 bg-slate-950 border border-slate-700 rounded-xl shadow-2xl space-y-2.5 z-50 text-xs">
                <div class="flex justify-between items-center border-b border-slate-800 pb-1.5">
                    <span class="font-bold text-slate-200 flex items-center gap-1"><i class="fa-solid fa-user-gear text-sky-400"></i> 修改巡檢人員</span>
                    <button onclick="toggleInspectorMenu(event)" class="text-slate-400 hover:text-white">✕</button>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-0.5">巡檢員姓名：</label>
                    <input type="text" id="inputInspectorName" class="w-full bg-slate-800 border border-slate-700 p-1.5 rounded text-white text-xs focus:outline-none focus:border-sky-500">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-0.5">所屬部門/組別：</label>
                    <input type="text" id="inputInspectorDept" class="w-full bg-slate-800 border border-slate-700 p-1.5 rounded text-white text-xs focus:outline-none focus:border-sky-500">
                </div>
                <button onclick="saveInspectorInfo()" class="w-full bg-sky-600 hover:bg-sky-500 text-white py-1.5 rounded text-[11px] font-bold transition-colors">
                    儲存變更
                </button>
            </div>
        </div>
    </aside>

    <!-- 主要內容區塊 -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-900 w-full min-w-0">
        
        <!-- Header 包含報表匯出功能按鈕 -->
        <header class="border-b border-slate-800 bg-slate-950/40 px-4 lg:px-6 py-3 shrink-0 flex items-center justify-between gap-2">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-300 hover:text-white p-1.5 rounded bg-slate-800 border border-slate-700">
                    <i class="fa-solid fa-bars text-base"></i>
                </button>

                <div class="flex flex-wrap items-center gap-1.5">
                    <span class="text-xs text-slate-400 hidden sm:inline">當前選擇：</span>
                    <span id="headerBoilerTitle" class="text-xs sm:text-sm font-bold text-sky-400 truncate max-w-[160px] sm:max-w-none">載入中...</span>
                    <span id="headerBoilerBadge" class="text-[10px] bg-amber-500/20 text-amber-300 border border-amber-500/30 px-2 py-0.5 rounded-full font-medium">熱水鍋爐</span>
                    <span id="qrScanNotice" class="hidden text-[10px] bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 px-2 py-0.5 rounded-full font-medium flex items-center gap-1">
                        <i class="fa-solid fa-circle-check"></i> QR 碼掃描成功
                    </span>
                </div>
            </div>

            <!-- 📊 匯出 Excel / PDF 按鈕區 -->
            <div class="flex items-center gap-2 no-print">
                <button onclick="exportToCSV()" class="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-300 border border-emerald-500/30 text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors">
                    <i class="fa-solid fa-file-excel"></i> <span class="hidden md:inline">匯出</span> Excel
                </button>
                <button onclick="exportToPDF()" class="bg-rose-600/20 hover:bg-rose-600/30 text-rose-300 border border-rose-500/30 text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors">
                    <i class="fa-solid fa-file-pdf"></i> <span class="hidden md:inline">匯出</span> PDF/列印
                </button>
            </div>
        </header>

        <!-- 頁籤內容區 -->
        <div class="flex-1 overflow-y-auto p-4 lg:p-6 space-y-6">

            <!-- TAB 1: 巡檢資料填報 -->
            <div id="tab-inspection" class="tab-content space-y-6">
                <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-4 lg:p-6 shadow-md">
                    <div class="flex justify-between items-center mb-5 pb-3 border-b border-slate-700">
                        <h2 class="font-semibold text-slate-100 flex items-center gap-2 text-base">
                            <i class="fa-solid fa-pen-to-square text-sky-400"></i> 新增日常巡檢紀錄
                        </h2>
                        <span class="text-xs text-slate-400 font-mono" id="currentDateStr">2026-07-22</span>
                    </div>

                    <form id="inspectionForm" onsubmit="submitInspection(event)" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 text-xs">
                            <div>
                                <label id="lblDynamicParam" class="block text-slate-300 font-medium mb-1.5">熱水出水溫度 (°C)</label>
                                <input type="number" step="any" id="inputDynamicParam" required placeholder="請輸入數值" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 text-sm focus:border-sky-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-slate-300 font-medium mb-1.5">排煙溫度 (°C)</label>
                                <input type="number" step="any" id="inputFlueTemp" required placeholder="例: 150 °C" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 text-sm focus:border-sky-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-slate-300 font-medium mb-1.5">水質硬度 (PPM)</label>
                                <input type="number" step="any" id="inputHardness" placeholder="例: 0 PPM" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 text-sm focus:border-sky-500 focus:outline-none transition-colors">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-xs">
                            <div>
                                <label class="block text-slate-300 font-medium mb-1.5">給水/入水溫度 (°C)</label>
                                <input type="number" step="any" id="inputInletTemp" placeholder="例: 25 °C" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 text-sm focus:border-sky-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-slate-300 font-medium mb-1.5">燃燒狀況 / 火焰顏色</label>
                                <select id="selectBurner" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 text-sm focus:border-sky-500 focus:outline-none">
                                    <option value="正常 (藍色火焰)">正常 (藍色火焰 / 穩定)</option>
                                    <option value="異常 (黃紅火焰)">異常 (黃紅火焰 / 偏黃)</option>
                                    <option value="冒黑煙/異音">冒黑煙 / 震動異音</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-slate-300 font-medium mb-1.5 text-xs">巡檢備註與紀錄</label>
                            <textarea id="inspectionMemo" rows="2" placeholder="無異常，運轉平穩..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 text-xs focus:border-sky-500 focus:outline-none"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg transition-all text-xs flex items-center justify-center gap-2 shadow-lg shadow-sky-600/20">
                            <i class="fa-solid fa-paper-plane"></i> 儲存巡檢紀錄
                        </button>
                    </form>
                </div>
            </div>

            <!-- TAB 2: 多維度巡檢數據與趨勢圖表 -->
            <div id="tab-trends" class="tab-content hidden space-y-6">
                <!-- 溫度/壓力趨勢主圖 -->
                <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-4 lg:p-6 shadow-md">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-chart-line text-emerald-400"></i> 近期巡檢數據趨勢分析
                        </h3>
                        <span id="chartBoilerLabel" class="text-xs bg-slate-900 text-sky-400 border border-slate-700 px-2 py-1 rounded font-mono"></span>
                    </div>
                    <div class="relative h-72 w-full">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <!-- 次要分析圖表雙欄區塊 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 1. 水質硬度與排煙溫度分析圖 -->
                    <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-4 shadow-md">
                        <h4 class="text-xs font-bold text-slate-300 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-droplet text-cyan-400"></i> 水質硬度 (PPM) 與排煙溫度對比
                        </h4>
                        <div class="relative h-56 w-full">
                            <canvas id="hardnessChart"></canvas>
                        </div>
                    </div>

                    <!-- 2. 設備運轉狀況圓餅圖 -->
                    <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-4 shadow-md flex flex-col items-center">
                        <h4 class="text-xs font-bold text-slate-300 mb-3 self-start flex items-center gap-2">
                            <i class="fa-solid fa-chart-pie text-amber-400"></i> 燃燒狀態與健康統計
                        </h4>
                        <div class="relative h-56 w-full flex justify-center">
                            <canvas id="statusPieChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 3: 維修保養履歷 -->
            <div id="tab-maintenance" class="tab-content hidden space-y-6">
                <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-4 lg:p-6 shadow-md">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-700">
                        <h3 class="text-sm font-bold text-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-wrench text-amber-400"></i> 設備保養與維修履歷紀錄
                        </h3>
                        <button onclick="toggleMaintenanceForm()" class="bg-amber-600/20 hover:bg-amber-600/30 text-amber-300 border border-amber-500/30 text-xs px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors no-print">
                            <i class="fa-solid fa-plus"></i> 新增保養履歷
                        </button>
                    </div>

                    <!-- 新增維修履歷表單 -->
                    <div id="maintFormBox" class="hidden mb-6 p-4 bg-slate-900 border border-amber-500/30 rounded-xl space-y-4 text-xs">
                        <h4 class="font-bold text-amber-400 flex items-center gap-1.5 text-xs">
                            <i class="fa-solid fa-file-circle-plus"></i> 填寫維修/保養紀錄
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-slate-400 mb-1">保養/維修日期</label>
                                <input type="date" id="maintDate" class="w-full bg-slate-800 border border-slate-700 p-2 rounded text-white focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-slate-400 mb-1">維修類別</label>
                                <select id="maintType" class="w-full bg-slate-800 border border-slate-700 p-2 rounded text-white focus:outline-none">
                                    <option value="定期保養">定期保養</option>
                                    <option value="零件更換">零件更換</option>
                                    <option value="緊急搶修">緊急搶修</option>
                                    <option value="水質清洗">水質/水垢清洗</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1">保養內容與更換零件說明</label>
                            <textarea id="maintContent" rows="2" placeholder="例: 更換軟水器濾芯、清洗燃燒嘴..." class="w-full bg-slate-800 border border-slate-700 p-2 rounded text-white focus:outline-none"></textarea>
                        </div>
                        <div class="flex justify-end gap-2">
                            <button onclick="toggleMaintenanceForm()" class="px-3 py-1.5 bg-slate-800 text-slate-300 rounded hover:bg-slate-700">取消</button>
                            <button onclick="saveMaintenanceLog()" class="px-4 py-1.5 bg-amber-600 text-white rounded hover:bg-amber-500 font-bold">儲存履歷</button>
                        </div>
                    </div>

                    <!-- 保養履歷表格 -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="border-b border-slate-700 text-slate-400 bg-slate-900/50 print-text-dark">
                                    <th class="p-3">日期</th>
                                    <th class="p-3">項目/類型</th>
                                    <th class="p-3">維修保養內容細節</th>
                                    <th class="p-3">執行人員</th>
                                </tr>
                            </thead>
                            <tbody id="maintTableBody" class="divide-y divide-slate-800 text-slate-300 print-text-dark">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const defaultBoilers = [
            { id: '1', name: '#1 貫流式鍋爐 (1.0 Ton/hr)', type: 'steam', detail: '型號: SF-1000Steam' },
            { id: '2', name: '#2 熱水鍋爐 (50萬 Kcal)', type: 'hotwater', detail: '型號: SF-500HW' },
            { id: '3', name: '#3 熱水鍋爐 (50萬 Kcal)', type: 'hotwater', detail: '型號: SF-500HW' },
            { id: '4', name: '#4 熱水鍋爐 (100萬 Kcal)', type: 'hotwater', detail: '型號: SF-100HW' },
            { id: '5', name: '#5 熱水鍋爐 (199W Kcal)', type: 'hotwater', detail: '型號: SF-199HW | 常用出水溫: 65°C' }
        ];

        let boilers = JSON.parse(localStorage.getItem('sf_boilers_v3')) || defaultBoilers;
        localStorage.setItem('sf_boilers_v3', JSON.stringify(boilers));

        let currentBoilerId = '1';
        let trendChartInstance = null;
        let hardnessChartInstance = null;
        let statusPieChartInstance = null;

        let inspectorInfo = JSON.parse(localStorage.getItem('sf_inspector_info')) || {
            name: '張工程師',
            dept: '廠區維護組'
        };

        let maintenanceLogs = JSON.parse(localStorage.getItem('sf_maint_logs')) || {
            '1': [{ date: '2026-06-10', type: '定期保養', content: '年度大保養、更換安全閥', inspector: inspectorInfo.name }],
            '2': [{ date: '2026-05-15', type: '零件更換', content: '更換點火電極與電磁閥', inspector: '李工程師' }],
            '4': [{ date: '2026-07-01', type: '水質清洗', content: '酸洗鍋爐積垢、測試水質硬度', inspector: inspectorInfo.name }]
        };

        // 預設巡檢數據示範（供圖表與 Excel 匯出）
        let inspectionRecords = JSON.parse(localStorage.getItem('sf_inspection_records')) || {
            '1': [
                { date: '2026-07-16', temp: 6.2, inlet: 20, flue: 160, hardness: 2, status: '正常 (藍色火焰)', memo: '良好', inspector: inspectorInfo.name },
                { date: '2026-07-17', temp: 6.5, inlet: 22, flue: 162, hardness: 0, status: '正常 (藍色火焰)', memo: '無異常', inspector: inspectorInfo.name },
                { date: '2026-07-18', temp: 6.4, inlet: 21, flue: 165, hardness: 5, status: '正常 (藍色火焰)', memo: '良好', inspector: inspectorInfo.name },
                { date: '2026-07-19', temp: 6.8, inlet: 23, flue: 163, hardness: 1, status: '正常 (藍色火焰)', memo: '良好', inspector: inspectorInfo.name },
                { date: '2026-07-20', temp: 6.5, inlet: 22, flue: 161, hardness: 0, status: '正常 (藍色火焰)', memo: '正常運轉', inspector: inspectorInfo.name },
                { date: '2026-07-21', temp: 6.6, inlet: 21, flue: 164, hardness: 3, status: '異常 (黃紅火焰)', memo: '調整風門', inspector: inspectorInfo.name },
                { date: '2026-07-22', temp: 6.7, inlet: 22, flue: 165, hardness: 0, status: '正常 (藍色火焰)', memo: '穩定', inspector: inspectorInfo.name }
            ]
        };

        function detectBoilerFromURL() {
            const url = window.location.href;
            const paramMatch = url.match(/[?&](?:b|boiler|id)=([0-9]+)/i);
            if (paramMatch && paramMatch[1]) return paramMatch[1];
            const numberMatch = url.match(/(?:%23|#|\/)?([1-9][0-9]*)(?:[^0-9]*)$/);
            if (numberMatch && numberMatch[1]) return numberMatch[1];
            return null;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('currentDateStr').innerText = new Date().toISOString().split('T')[0];
            document.getElementById('maintDate').value = new Date().toISOString().split('T')[0];

            updateInspectorUI();

            const scannedId = detectBoilerFromURL();
            if (scannedId) {
                const target = boilers.find(b => b.id === scannedId);
                if (target) {
                    currentBoilerId = target.id;
                    document.getElementById('qrScanNotice').classList.remove('hidden');
                } else {
                    currentBoilerId = scannedId;
                }
            } else {
                currentBoilerId = localStorage.getItem('sf_current_boiler_id') || '1';
            }

            renderBoilerSelect();
            updateUIByCurrentBoiler();
            initCharts();
        });

        // 人員編輯選單邏輯
        function toggleInspectorMenu(e) {
            e.stopPropagation();
            const box = document.getElementById('inspectorEditBox');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                document.getElementById('inputInspectorName').value = inspectorInfo.name;
                document.getElementById('inputInspectorDept').value = inspectorInfo.dept;
            }
        }

        function closeInspectorMenuOnOutsideClick(e) {
            const area = document.getElementById('inspectorArea');
            if (area && !area.contains(e.target)) {
                document.getElementById('inspectorEditBox').classList.add('hidden');
            }
        }

        function saveInspectorInfo() {
            const name = document.getElementById('inputInspectorName').value.trim();
            const dept = document.getElementById('inputInspectorDept').value.trim();
            if (!name) return alert('請輸入姓名！');

            inspectorInfo.name = name;
            inspectorInfo.dept = dept || '巡檢維護組';

            localStorage.setItem('sf_inspector_info', JSON.stringify(inspectorInfo));
            updateInspectorUI();
            document.getElementById('inspectorEditBox').classList.add('hidden');
        }

        function updateInspectorUI() {
            document.getElementById('inspectorName').innerText = inspectorInfo.name;
            document.getElementById('inspectorDept').innerText = inspectorInfo.dept;
            document.getElementById('inspectorAvatar').innerText = inspectorInfo.name.charAt(0) || '巡';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobileBackdrop').classList.toggle('hidden');
        }

        function toggleBoilerManager() {
            document.getElementById('boilerManagerBox').classList.toggle('hidden');
            document.getElementById('qrCodeContainer').classList.add('hidden');
        }

        function toggleMaintenanceForm() {
            document.getElementById('maintFormBox').classList.toggle('hidden');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('bg-brand-600', 'text-white');
                el.classList.add('text-slate-400');
            });

            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            const activeNav = document.getElementById(`nav-${tabName}`);
            if (activeNav) {
                activeNav.classList.add('bg-brand-600', 'text-white');
                activeNav.classList.remove('text-slate-400');
            }

            if (tabName === 'trends') {
                updateAllChartsData();
            }
        }

        function renderBoilerSelect() {
            const select = document.getElementById('leftBoilerSelect');
            select.innerHTML = boilers.map(b => `<option value="${b.id}" ${b.id === currentBoilerId ? 'selected' : ''}>${b.name}</option>`).join('');
        }

        function onBoilerChange() {
            currentBoilerId = document.getElementById('leftBoilerSelect').value;
            localStorage.setItem('sf_current_boiler_id', currentBoilerId);
            updateUIByCurrentBoiler();
            document.getElementById('qrCodeContainer').classList.add('hidden');
        }

        function updateUIByCurrentBoiler() {
            const b = boilers.find(x => x.id === currentBoilerId) || boilers[0];

            document.getElementById('headerBoilerTitle').innerText = b.name;
            document.getElementById('headerBoilerBadge').innerText = b.type === 'steam' ? '蒸氣鍋爐' : '熱水鍋爐';
            document.getElementById('leftBoilerDetailDisplay').innerText = b.detail || '暫無規格資訊';

            document.getElementById('editBoilerName').value = b.name;
            document.getElementById('editBoilerType').value = b.type;
            document.getElementById('editBoilerDetail').value = b.detail || '';

            const lbl = document.getElementById('lblDynamicParam');
            if (lbl) {
                lbl.innerText = b.type === 'steam' ? '蒸氣壓力 (kg/cm²)' : '熱水出水溫度 (°C)';
            }

            renderMaintenanceLogs();
            if (trendChartInstance) updateAllChartsData();
        }

        // 📈 初始化多圖表
        function initCharts() {
            // 1. 主趨勢折線圖
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            trendChartInstance = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: ['07/16', '07/17', '07/18', '07/19', '07/20', '07/21', '07/22'],
                    datasets: [
                        { label: '熱水出水溫度 (°C)', data: [60, 62, 61, 65, 64, 63, 65], borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.08)', fill: true, tension: 0.3 },
                        { label: '入水溫度 (°C)', data: [22, 23, 21, 25, 24, 23, 25], borderColor: '#10b981', fill: false, tension: 0.3 },
                        { label: '排煙溫度 (°C)', data: [145, 148, 150, 152, 149, 151, 150], borderColor: '#f59e0b', borderDash: [5, 5], fill: false, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
                    scales: {
                        x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                        y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }
                    }
                }
            });

            // 2. 水質硬度長條圖
            const ctxHardness = document.getElementById('hardnessChart').getContext('2d');
            hardnessChartInstance = new Chart(ctxHardness, {
                type: 'bar',
                data: {
                    labels: ['07/16', '07/17', '07/18', '07/19', '07/20', '07/21', '07/22'],
                    datasets: [
                        { label: '水質硬度 (PPM)', data: [2, 0, 5, 1, 0, 3, 0], backgroundColor: '#22d3ee' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
                    scales: {
                        x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                        y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }
                    }
                }
            });

            // 3. 燃燒狀態圓餅圖
            const ctxPie = document.getElementById('statusPieChart').getContext('2d');
            statusPieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['正常 (藍色火焰)', '異常 (黃紅火焰)', '冒黑煙/異音'],
                    datasets: [{
                        data: [6, 1, 0],
                        backgroundColor: ['#10b981', '#f59e0b', '#f43f5e']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 } } } }
                }
            });
        }

        function updateAllChartsData() {
            const b = boilers.find(x => x.id === currentBoilerId) || boilers[0];
            document.getElementById('chartBoilerLabel').innerText = b.name;

            if (b.type === 'steam') {
                trendChartInstance.data.datasets[0].label = '蒸氣壓力 (kg/cm²)';
                trendChartInstance.data.datasets[0].data = [6.2, 6.5, 6.4, 6.8, 6.5, 6.6, 6.7];
                trendChartInstance.data.datasets[1].label = '給水/入水溫度 (°C)';
                trendChartInstance.data.datasets[1].data = [20, 22, 21, 23, 22, 21, 22];
                trendChartInstance.data.datasets[2].data = [160, 162, 165, 163, 161, 164, 165];
            } else {
                trendChartInstance.data.datasets[0].label = '熱水出水溫度 (°C)';
                trendChartInstance.data.datasets[0].data = [60, 62, 61, 65, 64, 63, 65];
                trendChartInstance.data.datasets[1].label = '入水溫度 (°C)';
                trendChartInstance.data.datasets[1].data = [22, 23, 21, 25, 24, 23, 25];
                trendChartInstance.data.datasets[2].data = [145, 148, 150, 152, 149, 151, 150];
            }
            trendChartInstance.update();
            hardnessChartInstance.update();
            statusPieChartInstance.update();
        }

        // 📥 匯出 Excel (CSV 格式)
        function exportToCSV() {
            const b = boilers.find(x => x.id === currentBoilerId) || boilers[0];
            const records = inspectionRecords[currentBoilerId] || [];

            let csvContent = "\uFEFF"; // UTF-8 BOM，防止 Excel 開啟時簡體/繁體亂碼
            csvContent += `設備名稱,${b.name}\n`;
            csvContent += `設備類型,${b.type === 'steam' ? '蒸氣鍋爐' : '熱水鍋爐'}\n`;
            csvContent += `匯出時間,${new Date().toLocaleString()}\n\n`;

            csvContent += "日期,主要數值(壓力/溫度),給水溫度(°C),排煙溫度(°C),水質硬度(PPM),燃燒狀況,巡檢備註,巡檢人員\n";

            records.forEach(r => {
                csvContent += `"${r.date}","${r.temp}","${r.inlet}","${r.flue}","${r.hardness}","${r.status}","${r.memo}","${r.inspector}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `碩豐熱能_${b.name}_巡檢報表.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 📄 匯出 PDF / 列印報表
        function exportToPDF() {
            window.print();
        }

        function renderMaintenanceLogs() {
            const tbody = document.getElementById('maintTableBody');
            const logs = maintenanceLogs[currentBoilerId] || [];

            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-500">目前尚無保養維修紀錄。</td></tr>`;
                return;
            }

            tbody.innerHTML = logs.map(log => `
                <tr class="hover:bg-slate-800/40">
                    <td class="p-3 font-mono text-slate-400 print-text-dark">${log.date}</td>
                    <td class="p-3"><span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded text-[10px]">${log.type}</span></td>
                    <td class="p-3 text-slate-200 print-text-dark">${log.content}</td>
                    <td class="p-3 text-slate-400 print-text-dark">${log.inspector}</td>
                </tr>
            `).join('');
        }

        function saveMaintenanceLog() {
            const date = document.getElementById('maintDate').value;
            const type = document.getElementById('maintType').value;
            const content = document.getElementById('maintContent').value.trim();

            if (!content) return alert('請輸入維修保養內容！');

            if (!maintenanceLogs[currentBoilerId]) {
                maintenanceLogs[currentBoilerId] = [];
            }

            maintenanceLogs[currentBoilerId].unshift({
                date,
                type,
                content,
                inspector: inspectorInfo.name
            });

            localStorage.setItem('sf_maint_logs', JSON.stringify(maintenanceLogs));
            document.getElementById('maintContent').value = '';
            toggleMaintenanceForm();
            renderMaintenanceLogs();
            alert('維修保養履歷儲存成功！');
        }

        function generateQRCodeForCurrentBoiler() {
            const b = boilers.find(x => x.id === currentBoilerId);
            if (!b) return;

            const baseUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            const cleanUrl = `${baseUrl}?b=${b.id}`;

            document.getElementById('qrCodeTitleDisplay').innerText = `${b.name} 專屬 QR Code`;
            document.getElementById('qrCodeUrlText').innerText = cleanUrl;

            const container = document.getElementById('qrcode');
            container.innerHTML = '';

            new QRCode(container, {
                text: cleanUrl,
                width: 150,
                height: 150,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('qrCodeContainer').classList.remove('hidden');
        }

        function saveCurrentBoilerName() {
            const b = boilers.find(x => x.id === currentBoilerId);
            if (b) {
                b.name = document.getElementById('editBoilerName').value.trim();
                b.type = document.getElementById('editBoilerType').value;
                b.detail = document.getElementById('editBoilerDetail').value;
                localStorage.setItem('sf_boilers_v3', JSON.stringify(boilers));
                renderBoilerSelect();
                updateUIByCurrentBoiler();
                alert('設備資料已成功更新！');
            }
        }

        function addNewBoiler() {
            const name = document.getElementById('editBoilerName').value.trim();
            if (!name) return alert('請輸入設備名稱！');

            const nextId = String(boilers.length + 1);
            const newB = {
                id: nextId,
                name: name,
                type: document.getElementById('editBoilerType').value,
                detail: document.getElementById('editBoilerDetail').value
            };

            boilers.push(newB);
            currentBoilerId = nextId;
            localStorage.setItem('sf_boilers_v3', JSON.stringify(boilers));
            localStorage.setItem('sf_current_boiler_id', currentBoilerId);

            renderBoilerSelect();
            updateUIByCurrentBoiler();
            generateQRCodeForCurrentBoiler();
            alert('成功新增設備！');
        }

        function deleteCurrentBoiler() {
            if (boilers.length <= 1) return alert('無法刪除最後一台設備！');
            if (confirm(`確定要刪除「${currentBoilerId}」嗎？`)) {
                boilers = boilers.filter(b => b.id !== currentBoilerId);
                currentBoilerId = boilers[0].id;
                localStorage.setItem('sf_boilers_v3', JSON.stringify(boilers));
                localStorage.setItem('sf_current_boiler_id', currentBoilerId);
                renderBoilerSelect();
                updateUIByCurrentBoiler();
            }
        }

        function submitInspection(e) {
            e.preventDefault();

            const record = {
                date: new Date().toISOString().split('T')[0],
                temp: document.getElementById('inputDynamicParam').value,
                flue: document.getElementById('inputFlueTemp').value,
                hardness: document.getElementById('inputHardness').value || 0,
                inlet: document.getElementById('inputInletTemp').value || 0,
                status: document.getElementById('selectBurner').value,
                memo: document.getElementById('inspectionMemo').value || '無',
                inspector: inspectorInfo.name
            };

            if (!inspectionRecords[currentBoilerId]) {
                inspectionRecords[currentBoilerId] = [];
            }
            inspectionRecords[currentBoilerId].push(record);
            localStorage.setItem('sf_inspection_records', JSON.stringify(inspectionRecords));

            alert(`巡檢紀錄已儲存！ (巡檢員: ${inspectorInfo.name})`);
            document.getElementById('inspectionForm').reset();
        }
    </script>
</body>
</html>
