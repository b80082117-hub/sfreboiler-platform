<!-- AI 即時診斷卡片 -->
<div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-5 flex flex-col justify-between h-full">
    <div>
        <h2 class="font-semibold text-slate-200 mb-4 flex items-center gap-2 border-b border-slate-700 pb-3">
            <i class="fa-solid fa-microchip text-purple-400"></i> AI 巡檢即時診斷
        </h2>

        <!-- 健康度與燈號標籤 -->
        <div class="p-4 bg-slate-900/80 rounded-xl border border-slate-700 space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-xs text-slate-400 font-medium">設備健康狀態</span>
                <!-- 狀態標註燈號 -->
                <span id="aiHealthBadge" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span id="aiHealthStatusText">運行良好</span>
                </span>
            </div>

            <!-- 分數與進度條 -->
            <div>
                <div class="flex justify-between items-baseline mb-1">
                    <span id="aiHealthScore" class="text-3xl font-black text-emerald-400">96</span>
                    <span class="text-xs text-slate-500">/ 100 分</span>
                </div>
                <!-- 顏色進度條 -->
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="aiHealthBar" class="bg-emerald-400 h-full rounded-full transition-all duration-500" style="width: 96%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 即時建議 / 警告訊息 -->
    <div id="aiAlertNotice" class="mt-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-lg text-xs text-emerald-300 flex items-start gap-2">
        <i class="fa-solid fa-circle-check text-base shrink-0 mt-0.5"></i>
        <span id="aiAlertText">巡檢數據全數正常，目前無預警異常，請持續保持。</span>
    </div>
</div>
